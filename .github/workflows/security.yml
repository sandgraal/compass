name: Security

on:
  schedule:
    # Sunday 4am UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (npm 11 via npx)
        run: npx -y npm@11 ci
      - name: npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      - name: Knip — dead deps surface attack
        run: npx knip --no-progress --reporter codeclimate > knip-report.json || true
      - name: Upload knip report
        uses: actions/upload-artifact@v7
        with:
          name: knip-report
          path: knip-report.json
