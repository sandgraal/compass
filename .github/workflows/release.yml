name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  release-mac:
    name: Build & publish macOS release
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Configure code signing
        run: |
          if [ -n "${{ secrets.CSC_LINK }}" ] && [ -n "${{ secrets.CSC_KEY_PASSWORD }}" ]; then
            echo "CSC_LINK=${{ secrets.CSC_LINK }}" >> $GITHUB_ENV
            echo "CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "Signed release — Apple Developer certificate present."
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> $GITHUB_ENV
            echo "::warning title=Unsigned release::CSC_LINK / CSC_KEY_PASSWORD not set — publishing unsigned. Add Apple Developer certs to GitHub Secrets to sign future releases."
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npx -y npm@11 ci

      - name: Build and publish
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CSC_LINK / CSC_KEY_PASSWORD injected above only when present.
          # Optional notarization (add these secrets when you have an Apple Developer account):
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      # Claude Desktop one-click extension (Phase 8.3). Native better-sqlite3
      # binding is fetched per-arch; the bundle matching the runner arch is
      # smoke-tested, the other is a cross-arch build (binding can't execute here).
      - name: Build Claude Desktop extension bundles (.mcpb)
        run: |
          npm run build:mcpb -- --arch arm64
          npm run build:mcpb -- --arch x64

      - name: Attach .mcpb bundles to the release
        run: gh release upload "${GITHUB_REF_NAME}" dist/*.mcpb --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    name: Build & publish Windows release
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npx -y npm@11 ci

      - name: Build and publish
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional Windows code signing: set WIN_CSC_LINK + WIN_CSC_KEY_PASSWORD
          # in repo secrets to sign. Unsigned builds work but trigger SmartScreen
          # warnings on first launch.
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

  release-linux:
    name: Build & publish Linux release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npx -y npm@11 ci

      - name: Build and publish
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
