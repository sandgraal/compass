name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (npm 11 via npx — matches lockfile generator)
        run: npx -y npm@11 ci

      - name: Typecheck (renderer + main)
        run: npm run typecheck

      - name: Biome check
        run: npm run check

      - name: Knip (unused deps + dead code)
        run: npx knip --no-progress
        continue-on-error: true

      - name: Vitest
        run: npm run test:run

      - name: Build
        run: npm run build

  e2e:
    name: Playwright E2E (macOS)
    runs-on: macos-latest
    needs: test
    timeout-minutes: 20
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (npm 11 via npx)
        run: npx -y npm@11 ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run E2E
        run: npm run test:e2e
        env:
          CI: true
